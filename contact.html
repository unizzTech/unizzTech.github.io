<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>UnizzTech - Contact us</title>
  <link rel="stylesheet" href="./assets/css/contact.css">

  <!-- Favicon -->
  <link rel="shortcut icon" href="./assets/images/logo-ut.png" type="image/svg+xml">

  <!-- Fontawesome CDN Link -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
  <div class="container">
    <div class="content">
      <div class="left-side">
        <div class="address details">
          <i class="fas fa-map-marker-alt"></i>
          <div class="topic">Address</div>
          <div class="text-one">Nagpur 440001</div>
          <div class="text-two">Maharashtra, India</div>
        </div>
        <div class="phone details">
          <i class="fas fa-phone-alt"></i>
          <div class="topic">Phone</div>
          <div class="text-one">+91 7709447767</div>
          <div class="text-two">+91 8421952958</div>
        </div>
        <div class="email details">
          <i class="fas fa-envelope"></i>
          <div class="topic">Email</div>
          <div class="text-one">unizztech@gmail.com</div>
        </div>
      </div>
      <div class="right-side">
        <div class="topic-text">Send us a message</div>
        <p>If you have any work for us or any queries related to our services, feel free to send us a message here. It's our pleasure to assist you.</p>
        <form action="https://formspree.io/f/mwkddpoo" method="POST">
          <div class="input-box">
            <input type="text" id="name" name="name" placeholder="Enter your name">
          </div>
          <div class="input-box">
            <input type="text" id="email" name="email" placeholder="Enter your email">
          </div>
          <div class="input-box message-box">
            <textarea id="message" name="message" placeholder="Enter your message"></textarea>
          </div>
          <div class="button">
            <input type="submit" value="Send Now">
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
